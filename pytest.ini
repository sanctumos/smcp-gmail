[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short
markers =
    e2e: end-to-end tests (require Gmail credentials, run with -m e2e)
filterwarnings =
    ignore::DeprecationWarning

[coverage:run]
source = .
omit = tests/*, tmp/*, venv/*, .venv/*

[coverage:report]
fail_under = 80
show_missing = true
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
